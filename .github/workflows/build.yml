name: Build Android APK

on:
  push:
    branches: [ main, minimal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug 2>&1 | tee build.log

      - name: Verify APK exists
        run: |
          echo "=== Checking APK files ==="
          find . -name '*.apk' -type f -ls
          ls -la app/build/outputs/apk/debug/ || echo "Debug dir not found"
          cat app/build/outputs/apk/debug/output-metadata.json 2>/dev/null || echo "No metadata"

      - name: Show build errors if failed
        if: failure()
        run: |
          echo "=== BUILD LOG (last 100 lines) ==="
          tail -100 build.log || true

      - name: List APK files
        if: success()
        run: find . -name '*.apk' -type f

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
