<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工單資料提取器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .content {
            padding: 30px;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        .input-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }
        
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .result-section {
            display: none;
        }
        
        .result-section.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-card {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .result-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .field {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .field:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .field-label {
            font-weight: 600;
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .field-value {
            color: #333;
            font-size: 16px;
            word-break: break-word;
        }
        
        .field-value.empty {
            color: #999;
            font-style: italic;
        }
        
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 工單資料提取器</h1>
            <p>自動提取姓名、電話、地址</p>
        </div>
        
        <div class="content">
            <div class="input-section">
                <label for="inputText">📝 貼入工單內容：</label>
                <textarea id="inputText" placeholder="請貼入工單 raw text...&#10;&#10;例如：&#10;姓名：張三&#10;電話：61234567&#10;地址：香港九龍旺角..."></textarea>
            </div>
            
            <div class="button-group">
                <button class="btn-primary" onclick="extractData()">🚀 提取資料</button>
                <button class="btn-secondary" onclick="clearAll()">🗑️ 清除</button>
            </div>
            
            <div class="result-section" id="resultSection">
                <div class="result-card">
                    <h3>✅ 提取結果</h3>
                    <div id="resultContent"></div>
                    <button class="copy-btn" onclick="copyResult()">📋 複製結果</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // 提取邏輯
        function extractData() {
            const input = document.getElementById('inputText').value.trim();
            
            if (!input) {
                showToast('⚠️ 請先貼入工單內容');
                return;
            }
            
            const result = {
                name: extractName(input),
                phone: extractPhone(input),
                address: extractAddress(input)
            };
            
            displayResult(result);
        }
        
        // 提取姓名
        function extractName(text) {
            const patterns = [
                /姓名[：:]\s*([^\n]{2,20})/i,
                /名字[：:]\s*([^\n]{2,20})/i,
                /稱呼[：:]\s*([^\n]{2,20})/i,
                /客戶[：:]\s*([^\n]{2,20})/i,
                /聯絡人[：:]\s*([^\n]{2,20})/i
            ];
            
            for (const pattern of patterns) {
                const match = text.match(pattern);
                if (match && match[1]) {
                    return match[1].trim();
                }
            }
            
            return null;
        }
        
        // 提取電話
        function extractPhone(text) {
            const patterns = [
                /電話[：:]\s*([0-9\-\s]{8,15})/i,
                /手機[：:]\s*([0-9\-\s]{8,15})/i,
                /聯絡電話[：:]\s*([0-9\-\s]{8,15})/i,
                /電話號碼[：:]\s*([0-9\-\s]{8,15})/i,
                /(\+852[-\s]?[0-9]{8})/,
                /([0-9]{4}[-\s]?[0-9]{4})/,
                /([0-9]{8})/
            ];
            
            for (const pattern of patterns) {
                const match = text.match(pattern);
                if (match && match[1]) {
                    return match[1].trim();
                }
            }
            
            return null;
        }
        
        // 提取地址
        function extractAddress(text) {
            const patterns = [
                /地址[：:]\s*([^\n]{5,100})/i,
                /送貨地址[：:]\s*([^\n]{5,100})/i,
                /安裝地址[：:]\s*([^\n]{5,100})/i,
                /(香港[^\n]{5,100})/i,
                /(九龍[^\n]{5,100})/i,
                /(新界[^\n]{5,100})/i
            ];
            
            for (const pattern of patterns) {
                const match = text.match(pattern);
                if (match && match[1]) {
                    return match[1].trim();
                }
            }
            
            return null;
        }
        
        // 顯示結果
        function displayResult(result) {
            const resultContent = document.getElementById('resultContent');
            
            resultContent.innerHTML = `
                <div class="field">
                    <div class="field-label">👤 姓名</div>
                    <div class="field-value ${!result.name ? 'empty' : ''}">${result.name || '（未找到）'}</div>
                </div>
                <div class="field">
                    <div class="field-label">📞 電話</div>
                    <div class="field-value ${!result.phone ? 'empty' : ''}">${result.phone || '（未找到）'}</div>
                </div>
                <div class="field">
                    <div class="field-label">📍 地址</div>
                    <div class="field-value ${!result.address ? 'empty' : ''}">${result.address || '（未找到）'}</div>
                </div>
            `;
            
            document.getElementById('resultSection').classList.add('show');
            showToast('✅ 提取完成！');
        }
        
        // 清除所有
        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('resultSection').classList.remove('show');
            showToast('🗑️ 已清除');
        }
        
        // 複製結果
        function copyResult() {
            const resultContent = document.getElementById('resultContent');
            const text = resultContent.innerText;
            
            navigator.clipboard.writeText(text).then(() => {
                showToast('📋 已複製到剪貼簿！');
            }).catch(() => {
                showToast('❌ 複製失敗，請手動複製');
            });
        }
        
        // 顯示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
