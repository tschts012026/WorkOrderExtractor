<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WFM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:12px}
.container{max-width:800px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.2);overflow:hidden}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:14px;text-align:center;font-size:20px;font-weight:700}
.tab-bar{display:flex;border-bottom:2px solid #eee}
.tab-btn{flex:1;padding:11px 6px;text-align:center;font-size:13px;font-weight:600;border:none;background:none;cursor:pointer;color:#999;border-bottom:3px solid transparent}
.tab-btn.active{color:#667eea;border-bottom-color:#667eea}
.tab-content{display:none;padding:14px}
.tab-content.active{display:block}
.summary{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.summary span{padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600}
.s-p{background:#fff3cd;color:#856404}.s-d{background:#d4edda;color:#155724}.s-h{background:#f8d7da;color:#721c24}
.order-card{background:#fafafa;border-radius:12px;padding:10px;margin-bottom:8px;border-left:4px solid #667eea}
.order-card.done{border-left-color:#28a745;opacity:.7}.order-card.paused{border-left-color:#ffc107;opacity:.7}
.ot{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.oid{font-weight:700;color:#667eea;font-size:14px}
.ost{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.osa{background:#e3f2fd;color:#1565c0}.osd{background:#c8e6c9;color:#2e7d32}.osh{background:#fff9c4;color:#f57f17}
.og{display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;font-size:12px;color:#555}
.of{display:flex;gap:4px}.ol{color:#999;font-size:10px;min-width:36px}.ov{color:#333;word-break:break-all}
.oaddr{margin-top:3px;font-size:11px;color:#888}.opid{font-size:11px;color:#667eea}
.oact{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;align-items:center}
.oact input{width:60px;padding:3px 6px;border:1px solid #ddd;border-radius:8px;font-size:11px}
.oact button{padding:3px 10px;border:none;border-radius:8px;font-size:11px;cursor:pointer;font-weight:600}
.bd{background:#28a745;color:#fff}.bp{background:#ffc107;color:#333}.br{background:#17a2b8;color:#fff}.bx{background:#dc3545;color:#fff}
.irow{display:flex;align-items:center;gap:6px;width:100%;margin-bottom:3px}
.irow input{flex:1;padding:4px 8px;border:1px solid #ddd;border-radius:8px;font-size:12px}
.imeta{font-size:11px;color:#999;margin-top:2px}
.bdel{background:#dc3545;color:#fff;margin-left:4px}.bedit{background:#007bff;color:#fff;margin-left:4px}
textarea{width:100%;height:140px;border:2px solid #ddd;border-radius:12px;padding:10px;font-size:13px;font-family:monospace;resize:vertical}
.ebtn{display:flex;gap:8px;margin-top:8px}
.ebtn button{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.bext{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}.bclr{background:#f0f0f0;color:#666}
.rbox{margin-top:10px;padding:10px;background:#f8f9fa;border-radius:10px;display:none}
.ri{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee;font-size:12px}
.rl{color:#999;font-weight:600;min-width:70px}.rv{color:#333;text-align:right;word-break:break-all;max-width:60%}
.empty{text-align:center;padding:30px 15px;color:#ccc;font-size:13px}
.ddate{font-weight:700;color:#667eea;margin:8px 0 4px;font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:.3s}
.toast.show{opacity:1}
#allDatePicker{width:100%;padding:8px;border:2px solid #ddd;border-radius:10px;font-size:14px;margin-bottom:10px}
@media(max-width:480px){.og{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<div class="header">WFM</div>
<div class="tab-bar">
<button class="tab-btn active" onclick="switchTab('home')">Home</button>
<button class="tab-btn" onclick="switchTab('extract')">Extract</button>
<button class="tab-btn" onclick="switchTab('all')">All</button>
<button class="tab-btn" onclick="switchTab('history')">History</button>
</div>
<div id="tab-home" class="tab-content active">
<div class="summary" id="homeSummary"></div>
<div id="homeList"></div>
</div>
<div id="tab-extract" class="tab-content">
<textarea id="inputText" placeholder="Paste work order here..."></textarea>
<div class="ebtn">
<button class="bext" onclick="doExtract()">Extract</button>
<button class="bclr" onclick="clearInput()">Clear</button>
</div>
<div class="rbox" id="resultBox"></div>
</div>
<div id="tab-all" class="tab-content">
<input type="date" id="allDatePicker" onchange="renderAll()">
<div class="summary" id="allSummary"></div>
<div id="allList"></div>
</div>
<div id="tab-history" class="tab-content">
<div class="summary" id="histSummary"></div>
<div id="histList"></div>
<div style="margin-top:12px;display:flex;gap:8px">
<button class="bext" onclick="doExport()" style="flex:1;padding:8px">? Export</button>
<button class="bclr" onclick="document.getElementById('importFile').click()" style="flex:1;padding:8px">? Import</button>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="doImport(event)">
</div>
</div>
</div>
<div id="editBox" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;overflow:auto"></div>
<div class="toast" id="toast"></div>
<script>
function esc(s){return s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"):"";}
function todayStr(){var d=new Date();return d.getFullYear()+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+String(d.getDate()).padStart(2,"0");}
function getOrders(){try{return JSON.parse(localStorage.getItem("wfm_orders")||"[]");}catch(e){return[];}}
function saveOrders(o){localStorage.setItem("wfm_orders",JSON.stringify(o));}
function findIdx(jobId,sn,date){var o=getOrders();for(var i=0;i<o.length;i++){if(o[i].jobId===jobId&&o[i].serviceNumber===sn&&o[i].appointmentDate===date)return i;}return-1;}

function switchTab(name){
  document.querySelectorAll(".tab-content").forEach(function(e){e.classList.remove("active");});
  document.querySelectorAll(".tab-btn").forEach(function(e){e.classList.remove("active");});
  document.getElementById("tab-"+name).classList.add("active");
  var btns=document.querySelectorAll(".tab-btn");
  var map={home:0,extract:1,all:2,history:3};
  btns[map[name]].classList.add("active");
  if(name==="home")renderHome();
  else if(name==="all")renderAll();
  else if(name==="history")renderHistory();
}

function renderHome(){
  var td=todayStr();
  var orders=getOrders().filter(function(o){return o.appointmentDate===td&&o.orderStatus!=="done"&&o.orderStatus!=="paused";});
  document.getElementById("homeSummary").innerHTML="<span class=\"s-p\">"+orders.length+" orders today ("+td+")</span>";
  if(orders.length===0){document.getElementById("homeList").innerHTML="<div class=\"empty\">No orders for today</div>";return;}
  var h="";orders.forEach(function(o){h+=card(o);});document.getElementById("homeList").innerHTML=h;
}

function renderAll(){
  var dp=document.getElementById("allDatePicker");
  if(!dp.value){dp.value=new Date().toISOString().split("T")[0];}
  var p=dp.value.split("-");var ds=p[0]+"/"+p[1]+"/"+p[2];
  var all=getOrders().filter(function(o){return o.appointmentDate===ds;});
  var ac=all.filter(function(o){return o.orderStatus!=="done"&&o.orderStatus!=="paused";}).length;
  var dc=all.filter(function(o){return o.orderStatus==="done";}).length;
  var hc=all.filter(function(o){return o.orderStatus==="paused";}).length;
  document.getElementById("allSummary").innerHTML="<span class=\"s-p\">"+ac+" active</span>"+(dc?"<span class=\"s-d\">"+dc+" done</span>":"")+(hc?"<span class=\"s-h\">"+hc+" paused</span>":"");
  if(all.length===0){document.getElementById("allList").innerHTML="<div class=\"empty\">No orders for "+ds+"</div>";return;}
  var h="";all.forEach(function(o){h+=cardFull(o);});document.getElementById("allList").innerHTML=h;
}

function renderHistory(){
  var orders=getOrders().filter(function(o){return o.orderStatus==="done"||o.orderStatus==="paused";});
  var tf=orders.reduce(function(s,o){return s+parseFloat(o.fare||0);},0);
  document.getElementById("histSummary").innerHTML="<span class=\"s-d\">"+orders.filter(function(o){return o.orderStatus==="done";}).length+" done</span> <span class=\"s-h\">"+orders.filter(function(o){return o.orderStatus==="paused";}).length+" paused</span> <span class=\"s-p\">Total: $"+tf.toFixed(1)+"</span>";
  if(orders.length===0){document.getElementById("histList").innerHTML="<div class=\"empty\">No history</div>";return;}
  var byD={};orders.forEach(function(o){if(!byD[o.appointmentDate])byD[o.appointmentDate]=[];byD[o.appointmentDate].push(o);});
  var h="";Object.keys(byD).sort().reverse().forEach(function(d){
    h+="<div class=\"ddate\">"+d+"</div>";byD[d].forEach(function(o){h+=cardHist(o);});
  });document.getElementById("histList").innerHTML=h;
}

function card(o){
  var s=o.orderStatus==="done"?"done":o.orderStatus==="paused"?"paused":"";
  return "<div class=\"order-card "+s+"\">"+cardInner(o,false)+"</div>";
}
function cardFull(o){
  var s=o.orderStatus==="done"?"done":o.orderStatus==="paused"?"paused":"";
  return "<div class=\"order-card "+s+"\">"+cardInner(o,true)+"</div>";
}
function cardHist(o){
  var s=o.orderStatus==="done"?"done":"paused";
  return "<div class=\"order-card "+s+"\">"+cardInner(o,true)+"</div>";
}

function qs(s){return s?s.replace(/'/g,"&#39;").replace(/"/g,"&quot;"):"";}
function cardInner(o,full){
  var sc=o.orderStatus==="done"?"osd":o.orderStatus==="paused"?"osh":"osa";
  var st=o.orderStatus==="done"?"DONE":o.orderStatus==="paused"?"PAUSED":"ACTIVE";
  var jid=qs(o.jobId),sid=qs(o.serviceNumber),did=qs(o.appointmentDate);
  var h="<div class=\"ot\"><div class=\"oid\">"+esc(o.jobId||"N/A")+"</div><span class=\"ost "+sc+"\">"+st+"</span></div>";
  h+="<div class=\"og\">";
  h+=fld("Grid",o.grid)+fld("Svc#",o.serviceNumber)+fld("BSN",o.bsn);
  h+=fld("Date",o.appointmentDate);
  if(full){h+=fld("Time",o.time);}
  h+="</div>";
  if(o.address)h+="<div class=\"oaddr\">"+esc(o.address)+"</div>";
  if(o.pidDesc)h+="<div class=\"opid\">"+esc(o.pidDesc)+"</div>";
  h+="<div class=\"oact\" data-j='"+jid+"' data-s='"+sid+"' data-d='"+did+"'>";
  h+="<div class=\"irow\"><span class=\"ol\">Fare $</span><input type=\"number\" placeholder=\"0\" value=\""+(o.fare||"")+"\" onchange=\"doSave(this)\"></div>";
  h+="<div class=\"irow\"><span class=\"ol\">Note</span><input type=\"text\" placeholder=\"Add note...\" value=\""+qs(o.note||"")+"\" onchange=\"doSave(this)\"></div>";
  if(o.orderStatus!=="done"&&o.orderStatus!=="paused"){
    h+="<button class=\"bd\" onclick=\"doMark(this,'done')\">Done</button>";
    h+="<button class=\"bp\" onclick=\"doMark(this,'paused')\">Pause</button>";
  }else{
    h+="<button class=\"br\" onclick=\"doMark(this,'active')\">Restore</button>";
  }
  h+=" <button class=\"bedit\" onclick=\"doEdit(this)\">Edit</button><button class=\"bdel\" onclick=\"doDelete(this)\">Delete</button>";
  h+="</div>";
  if(o.fare)h+="<div class=\"imeta\">Fare: $"+esc(o.fare)+(o.note?" | "+esc(o.note):"")+"</div>";
  return h;
}

function fld(l,v){return v?"<div class=\"of\"><span class=\"ol\">"+l+"</span><span class=\"ov\">"+esc(v)+"</span></div>":"";}

function doSave(input){
  var act=input.closest(".oact");var jobId=act.dataset.j,sn=act.dataset.s,date=act.dataset.d;
  var orders=getOrders();var i=findIdx(jobId,sn,date);
  if(i>=0){
    var fareInput=act.querySelector('input[type=number]');
    var noteInput=act.querySelector('input[type=text]');
    orders[i].fare=fareInput.value;orders[i].note=noteInput.value;
    saveOrders(orders);toast("Saved");
  }
}
function doMark(btn,status){
  var act=btn.parentElement;var jobId=act.dataset.j,sn=act.dataset.s,date=act.dataset.d;
  // save any pending input first
  var fareInput=act.querySelector('input[type=number]');
  var noteInput=act.querySelector('input[type=text]');
  var orders=getOrders();var i=findIdx(jobId,sn,date);
  if(i>=0){
    orders[i].fare=fareInput.value;orders[i].note=noteInput.value;
    orders[i].orderStatus=status;saveOrders(orders);toast(status==="done"?"Done!":status==="paused"?"Paused":"Restored");
  }
  var t=btn.closest(".tab-content").id;
  if(t==="tab-home")renderHome();else if(t==="tab-all")renderAll();else renderHistory();
}

function doExport(){
  var orders=getOrders();
  if(orders.length===0){toast("No data to export");return;}
  var blob=new Blob([JSON.stringify(orders,null,2)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="wfm_backup_"+todayStr().replace(/\//g,"-")+".json";
  a.click();URL.revokeObjectURL(a.href);
  toast("Exported "+orders.length+" orders");
}
function doImport(ev){
  var file=ev.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!Array.isArray(data)){toast("Invalid file");return;}
      var existing=getOrders();
      var added=0;
      data.forEach(function(o){
        if(o.jobId&&o.appointmentDate){
          var idx=findIdx(o.jobId,o.serviceNumber,o.appointmentDate);
          if(idx<0){existing.push(o);added++;}
        }
      });
      saveOrders(existing);
      toast("Imported "+added+" new orders ("+data.length+" total in file)");
      renderHome();renderAll();renderHistory();
    }catch(err){toast("Import failed: invalid file");}
  };
  reader.readAsText(file);
  ev.target.value="";
}

/* EXTRACT */
var KL={"job id":"job id","jobid":"job id","exchange / grid":"exchange / grid","grid":"grid","bsn":"bsn","bsn.":"bsn","service number":"service number","service #":"service number","appointment date":"appointment date","appointment time":"appointment time","status":"status","pid desc":"pid desc","pid":"pid","a end address":"a end address","address":"a end address","address showmap":"a end address","contact name":"contact name","contact no.":"contact no.","contact no":"contact no.","contact mobile":"contact mobile"};

function extractEnglish(text){
  var fields={},lines=text.split("\n"),i=0;
  while(i<lines.length){
    var line=lines[i].trim();
    if(!line){i++;continue;}
    var m=line.match(/^([A-Za-z][A-Za-z \/.()#&]+?)\s*[:\uff1a]\s*(.*)/);
    if(m&&m[2].trim()){var k=m[1].trim().toLowerCase();if(KL[k])fields[KL[k]]=m[2].trim();i++;continue;}
    var lk=line.toLowerCase();
    if(KL[lk]&&!fields[KL[lk]]){
      var j=i+1;while(j<lines.length&&!lines[j].trim())j++;
      if(j<lines.length){var nxt=lines[j].trim();if(!KL[nxt.toLowerCase()]){fields[KL[lk]]=nxt;i=j;}}
    }
    i++;
  }
  var cn=fields["contact name"]||"";var cno=fields["contact no."]||"";var cm=fields["contact mobile"]||"";
  if((!cno||!/\d{4}/.test(cno))&&cm&&/\d{4}/.test(cm))cno=cm;
  if(cn)cn=cn.replace(/\s*(?:Contact(?:\s+(?:Mobile|No\.?|Number|Tel|Phone))?)$/i,"").trim();
  if(cn)cn=cn.replace(/\s*(?:Mobile|No\.?|Number|Tel|Phone)$/i,"").trim();
  return{jobId:fields["job id"]||null,pid:fields["pid"]||null,grid:fields["exchange / grid"]||fields["grid"]||null,serviceNumber:fields["service number"]||null,bsn:fields["bsn"]||null,address:fields["a end address"]||null,appointmentDate:fields["appointment date"]||null,time:fields["appointment time"]||null,contact:cn||null,phone:cno||null,status:fields["status"]||null,pidDesc:fields["pid desc"]||fields["pid"]||null};
}

function doExtract(){
  var text=document.getElementById("inputText").value.trim();
  if(!text){toast("Paste work order first");return;}
  var data=extractEnglish(text);
  if(!data.jobId&&!data.serviceNumber&&!data.address){toast("Cannot extract");return;}
  var box=document.getElementById("resultBox");box.style.display="block";
  var items=[["Job ID",data.jobId],["Grid",data.grid],["Service #",data.serviceNumber],["BSN",data.bsn],["Address",data.address],["Date",data.appointmentDate],["Time",data.time],["Contact",data.contact],["Phone",data.phone],["Status",data.status],["PID Desc",data.pidDesc]];
  var h="<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px\"><b>Result</b><button onclick=\"saveResult()\" style=\"padding:5px 14px;border:none;border-radius:8px;background:#667eea;color:#fff;font-weight:700;cursor:pointer;font-size:12px\">Save</button></div>";
  items.forEach(function(it){h+="<div class=\"ri\"><span class=\"rl\">"+it[0]+"</span><span class=\"rv\">"+esc(it[1]||"(N/A)")+"</span></div>";});
  box.innerHTML=h;box.dataset.data=JSON.stringify(data);
}

function saveResult(){
  var box=document.getElementById("resultBox");var data=JSON.parse(box.dataset.data);if(!data)return;
  var orders=getOrders();
  if(orders.some(function(o){return o.jobId===data.jobId&&o.serviceNumber===data.serviceNumber&&o.appointmentDate===data.appointmentDate;})){toast("Already saved");return;}
  data.orderStatus="active";data.fare="";data.note="";orders.push(data);saveOrders(orders);toast("Saved!");switchTab("home");
}

function clearInput(){document.getElementById("inputText").value="";document.getElementById("resultBox").style.display="none";}
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2000);}

function doDelete(btn){
  if(!confirm("Delete this order?"))return;
  var act=btn.closest(".oact");
  var jobId=act.dataset.j,sn=act.dataset.s,date=act.dataset.d;
  var orders=getOrders();
  var i=findIdx(jobId,sn,date);
  if(i>=0){orders.splice(i,1);saveOrders(orders);toast("Deleted");}
  var t=document.querySelector(".tab-content.active").id;
  if(t==="tab-home")renderHome();else if(t==="tab-all")renderAll();else renderHistory();
}

function doEdit(btn){
  var act=btn.closest(".oact");
  var jobId=act.dataset.j,sn=act.dataset.s,date=act.dataset.d;
  var orders=getOrders();
  var i=findIdx(jobId,sn,date);
  if(i<0)return;
  var o=orders[i];
  var h="<div style='padding:10px'><b style='display:block;margin-bottom:10px'>Edit Order</b>";
  h+="<div style='margin-bottom:8px'><label style='font-size:12px;color:#999;display:block'>Job ID</label><input type='text' id='ef_jobId' value='"+esc(o.jobId||"")+"' style='width:100%;padding:6px;border:1px solid #ddd;border-radius:8px;font-size:13px'></div>";
  h+="<div style='margin-bottom:8px'><label style='font-size:12px;color:#999;display:block'>Grid</label><input type='text' id='ef_grid' value='"+esc(o.grid||"")+"' style='width:100%;padding:6px;border:1px solid #ddd;border-radius:8px;font-size:13px'></div>";
  h+="<div style='margin-bottom:8px'><label style='font-size:12px;color:#999;display:block'>Service#</label><input type='text' id='ef_sn' value='"+esc(o.serviceNumber||"")+"' style='width:100%;padding:6px;border:1px solid #ddd;border-radius:8px;font-size:13px'></div>";
  h+="<div style='margin-bottom:8px'><label style='font-size:12px;color:#999;display:block'>BSN</label><input type='text' id='ef_bsn' value='"+esc(o.bsn||"")+"' style='width:100%;padding:6px;border:1px solid #ddd;border-radius:8px;font-size:13px'></div>";
  h+="<div style='margin-bottom:8px'><label style='font-size:12px;color:#999;display:block'>Address</label><input type='text' id='ef_addr' value='"+esc(o.address||"")+"' style='width:100%;padding:6px;border:1px solid #ddd;border-radius:8px;font-size:13px'></div>";
  h+="<div style='margin-bottom:8px'><label style='font-size:12px;color:#999;display:block'>Date</label><input type='text' id='ef_date' value='"+esc(o.appointmentDate||"")+"' style='width:100%;padding:6px;border:1px solid #ddd;border-radius:8px;font-size:13px'></div>";
  h+="<div style='margin-bottom:8px'><label style='font-size:12px;color:#999;display:block'>Time</label><input type='text' id='ef_time' value='"+esc(o.time||"")+"' style='width:100%;padding:6px;border:1px solid #ddd;border-radius:8px;font-size:13px'></div>";
  h+="<div style='margin-bottom:8px'><label style='font-size:12px;color:#999;display:block'>Contact</label><input type='text' id='ef_contact' value='"+esc(o.contact||"")+"' style='width:100%;padding:6px;border:1px solid #ddd;border-radius:8px;font-size:13px'></div>";
  h+="<div style='margin-bottom:8px'><label style='font-size:12px;color:#999;display:block'>Phone</label><input type='text' id='ef_phone' value='"+esc(o.phone||"")+"' style='width:100%;padding:6px;border:1px solid #ddd;border-radius:8px;font-size:13px'></div>";
  h+="<div style='margin-bottom:8px'><label style='font-size:12px;color:#999;display:block'>PID Desc</label><input type='text' id='ef_pid' value='"+esc(o.pidDesc||"")+"' style='width:100%;padding:6px;border:1px solid #ddd;border-radius:8px;font-size:13px'></div>";
  h+="<div style='display:flex;gap:8px;margin-top:10px'><button onclick=\"doSaveEdit()\" style='flex:1;padding:8px;background:#667eea;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer'>Save</button><button onclick=\"cancelEdit()\" style='flex:1;padding:8px;background:#eee;color:#666;border:none;border-radius:8px;font-weight:700;cursor:pointer'>Cancel</button></div></div>";
  document.getElementById("editBox").innerHTML=h;document.getElementById("editBox").style.display="block";
}

function doSaveEdit(){
  var orders=getOrders();
  var i=findIdx(document.getElementById("ef_jobId").value,document.getElementById("ef_sn").value,document.getElementById("ef_date").value);
  if(i<0){toast("Order not found");return;}
  orders[i].jobId=document.getElementById("ef_jobId").value;
  orders[i].grid=document.getElementById("ef_grid").value;
  orders[i].serviceNumber=document.getElementById("ef_sn").value;
  orders[i].bsn=document.getElementById("ef_bsn").value;
  orders[i].address=document.getElementById("ef_addr").value;
  orders[i].appointmentDate=document.getElementById("ef_date").value;
  orders[i].time=document.getElementById("ef_time").value;
  orders[i].contact=document.getElementById("ef_contact").value;
  orders[i].phone=document.getElementById("ef_phone").value;
  orders[i].pidDesc=document.getElementById("ef_pid").value;
  saveOrders(orders);document.getElementById("editBox").style.display="none";toast("Updated!");
  renderHome();renderAll();renderHistory();
}

function cancelEdit(){document.getElementById("editBox").style.display="none";}


renderHome();

/* PWA Service Worker */
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(function(e){});}

</script>
